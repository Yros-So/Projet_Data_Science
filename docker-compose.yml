services:
  postgres:
    image: postgres:16
    container_name: ecommerce_ds_postgres
    environment:
      POSTGRES_DB: ecommerce_ds
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
